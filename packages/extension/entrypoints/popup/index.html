<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mutsu: pick a source</title>
    <style>
      :root {
        color-scheme: dark;
        /* Shared palette with the web app (packages/web/src/app.css) so both
           surfaces read as one product. Keep these in sync. */
        --bg: #0e0f13;
        --panel: #171922;
        --panel-2: #1f2230;
        --line: #2a2e3d;
        --text: #e7e9ef;
        --muted: #9aa0b4;
        --accent: #6c7cff;
        --good: #41d18a;
        --warn: #f5a623;
        --bad: #ff5d6c;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
      }
      body {
        width: 380px;
        max-height: 560px;
        overflow: hidden;
        font: 13px/1.45 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
      }
      header {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      header .brand {
        font-weight: 600;
        letter-spacing: 0.4px;
      }
      .head-right {
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }
      .panel {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
      }
      .panel[hidden] { display: none; }
      .create-room {
        display: block;
        width: calc(100% - 24px);
        margin: 12px 12px 4px;
        padding: 9px;
        font: inherit;
        font-weight: 600;
        text-align: center;
        color: #fff;
        background: var(--accent);
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
      .create-room:hover {
        filter: brightness(1.08);
      }
      .create-room.secondary {
        margin-top: 4px;
        color: var(--text);
        background: var(--panel-2);
        border: 1px solid var(--line);
      }
      .create-room.secondary:hover {
        filter: none;
        border-color: var(--accent);
      }
      .create-room.secondary[hidden] {
        display: none;
      }
      .sat-card {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 12px 12px 0;
        padding: 9px 10px;
        border: 1px solid color-mix(in srgb, var(--accent) 40%, var(--line));
        border-radius: 8px;
        background: color-mix(in srgb, var(--accent) 12%, var(--panel));
      }
      .sat-card[hidden] {
        display: none;
      }
      .sat-info {
        display: flex;
        flex-direction: column;
        gap: 1px;
        margin-right: auto;
        min-width: 0;
      }
      .sat-title {
        font-weight: 600;
      }
      .sat-meta {
        font-size: 11px;
        color: var(--muted);
      }
      .sat-toggle {
        flex: none;
        font: inherit;
        font-size: 12px;
        color: var(--text);
        background: var(--panel-2);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 5px 10px;
        cursor: pointer;
      }
      .sat-toggle:hover {
        border-color: var(--accent);
      }
      /* ── destination (where the chosen source goes) ── */
      .dest {
        padding: 10px 12px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .dest[hidden] {
        display: none;
      }
      .dest-opts {
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }
      .dest-opt {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--text);
        cursor: pointer;
      }
      .dest-opt select {
        font: inherit;
        color: var(--text);
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 3px 6px;
        max-width: 140px;
      }
      .seg {
        display: inline-flex;
        align-self: flex-start;
        border: 1px solid var(--line);
        border-radius: 7px;
        overflow: hidden;
      }
      .seg[hidden] {
        display: none;
      }
      .seg-btn {
        font: inherit;
        font-size: 12px;
        color: var(--muted);
        background: var(--bg);
        border: none;
        padding: 4px 12px;
        cursor: pointer;
      }
      .seg-btn + .seg-btn {
        border-left: 1px solid var(--line);
      }
      .seg-btn.active {
        background: var(--accent);
        color: #fff;
      }
      /* the current tab as a `site` source, styled like a scanned candidate */
      .page-cand[hidden] {
        display: none;
      }
      .room-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--line);
      }
      .room-bar-label { font-size: 12px; color: var(--muted); margin-right: auto; }
      .rescan {
        font: inherit;
        font-size: 12px;
        color: var(--text);
        background: var(--panel-2);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 3px 9px;
        cursor: pointer;
      }
      .rescan:hover {
        border-color: var(--accent);
      }
      .rescan:disabled {
        opacity: 0.5;
        cursor: default;
      }
      #list {
        overflow-y: auto;
        flex: 1;
        min-height: 80px;
      }
      .cand {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-bottom: 1px solid var(--line);
        cursor: pointer;
        width: 100%;
        text-align: left;
        background: none;
        border-left: none;
        border-right: none;
        border-top: none;
        color: inherit;
        font: inherit;
      }
      .cand:hover {
        background: var(--panel-2);
      }
      .cand:disabled {
        cursor: default;
        opacity: 0.6;
      }
      .ico {
        flex: none;
        width: 28px;
        height: 28px;
        border-radius: 7px;
        display: grid;
        place-items: center;
        background: var(--panel-2);
        color: var(--muted);
      }
      .cand:hover .ico {
        color: var(--text);
      }
      .meta {
        min-width: 0;
        flex: 1;
      }
      .meta .url {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .meta .sub {
        color: var(--muted);
        font-size: 11px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .tag {
        flex: none;
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--good) 20%, transparent);
        color: var(--good);
      }
      .empty {
        padding: 16px 12px;
        color: var(--muted);
      }
      .manual {
        padding: 8px 12px;
        border-top: 1px solid var(--line);
        display: flex;
        gap: 8px;
        background: var(--panel);
      }
      .manual input {
        flex: 1;
        min-width: 0;
        font: inherit;
        color: var(--text);
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 5px 8px;
      }
      button.send {
        font: inherit;
        color: var(--text);
        background: var(--panel-2);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 5px 10px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        line-height: 0;
      }
      button.send:hover {
        border-color: var(--accent);
      }
      #notice {
        padding: 7px 12px;
        font-size: 12px;
        border-top: 1px solid var(--line);
        display: none;
      }
      #notice.ok {
        display: block;
        color: var(--good);
        background: color-mix(in srgb, var(--good) 14%, transparent);
      }
      #notice.err {
        display: block;
        color: var(--bad);
        background: color-mix(in srgb, var(--bad) 14%, transparent);
      }
    </style>
  </head>
  <body>
    <header>
      <span class="brand">mutsu</span>
    </header>
    <div class="panel" id="roomPanel">
      <!-- This tab is in a watch party (§11) — show/hide its in-tab widget. -->
      <div class="sat-card" id="satCard" hidden>
        <div class="sat-info"><span class="sat-title">▶ Watching here</span><span class="sat-meta" id="satMeta"></span></div>
        <button class="sat-toggle" id="satToggle">Hide widget</button>
      </div>
      <!-- Destination: where the chosen source goes. Defaults to the open room
           when one exists, else a new room (the row hides when no room is open). -->
      <div class="dest" id="destRow" hidden>
        <div class="dest-opts">
          <label class="dest-opt">
            <input type="radio" name="dest" id="destRoomRadio" value="room" checked />
            <span>Add to</span>
            <select id="room"></select>
          </label>
          <label class="dest-opt">
            <input type="radio" name="dest" id="destNewRadio" value="new" />
            <span>New room</span>
          </label>
        </div>
        <div class="seg" id="playModeRow">
          <button type="button" class="seg-btn active" id="playNow">Play now</button>
          <button type="button" class="seg-btn" id="playQueue">Queue</button>
        </div>
      </div>

      <div class="room-bar">
        <span class="room-bar-label">Watch together</span>
        <span class="muted" id="count"></span>
        <button class="rescan" id="rescan" title="Scan this tab again">Rescan</button>
      </div>

      <!-- The current tab itself, as a frame-forbidding `site` source (§11). -->
      <button class="cand page-cand" id="watchPage" type="button" hidden></button>
      <div id="list"></div>
      <div class="manual">
        <input id="manualUrl" type="text" placeholder="…or paste an embed/source URL" />
        <button class="send" id="manualSend">go</button>
      </div>

      <button class="create-room secondary" id="newRoom">＋ New empty room</button>
      <div id="notice"></div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
